<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado de Evaluación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
    </style>
</head>
<body class="bg-light">

    <header class="bg-dark py-3 shadow-sm">
        <div class="container">
            <h1 class="h4 text-white mb-0">Sistema de Evaluación Crediticia</h1>
        </div>
    </header>

    <main class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="alert alert-{{ clase }} shadow-sm py-5">
                    <h2 class="display-5 mb-3">{{ resultado }}</h2>
                    <p class="lead">La probabilidad estimada de impago es del {{ probabilidad }}%</p>
                    <hr>
                    <p class="small text-muted">Evaluación realizada con un umbral de riesgo del 10.0%</p>
                </div>
                <a href="/" class="btn btn-outline-secondary mt-3">Volver al formulario</a>
            </div>
        </div>
    </main>

    <footer class="bg-dark py-3 text-center text-white mt-auto">
        <div class="container">
            <p class="mb-0">Proyecto de Riesgo Crediticio - 2026</p>
        </div>
    </footer>

</body>
</html>
